<!DOCTYPE html>
<html>
<head>
    <title>Signup - Cloud Leak Analyzer</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .bg-motion {
            animation: zoom 20s ease-in-out infinite alternate;
        }

        @keyframes zoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden relative">

<!-- BACKGROUND -->
<div class="absolute inset-0 bg-motion bg-cover bg-center"
     style="background-image: url('/static/bg.png');">
</div>

<!-- OVERLAY -->
<div class="absolute inset-0 bg-black/40"></div>

<!-- CENTER -->
<div class="relative z-10 flex flex-col items-center justify-center h-full">

    <h1 class="text-white text-2xl mb-6 tracking-wide">
        Cloud Leak Analyzer
    </h1>

    <!-- SIGNUP CARD -->
    <div class="backdrop-blur-xl bg-white/5 border border-white/10 p-8 rounded-2xl w-[320px]">

        <h2 class="text-white text-lg mb-6 text-center">Create Account</h2>

        <form method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="Username"
                class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10 text-white placeholder-gray-400 focus:outline-none focus:border-white/30">

            <input type="password" name="password" placeholder="Password"
                class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10 text-white placeholder-gray-400 focus:outline-none focus:border-white/30">

            <button type="submit"
                class="w-full bg-white text-black py-2 rounded-lg hover:bg-gray-200 transition">
                Signup
            </button>
        </form>

        <p class="text-sm text-gray-300 mt-6 text-center">
            Already have an account?
            <a href="/login" class="text-white hover:underline">Login</a>
        </p>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Cloud Leak Analyzer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #020014;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div class="relative z-10 h-screen flex items-center justify-center text-white">

    <div class="backdrop-blur-xl bg-white/5 border border-white/10 p-8 rounded-2xl w-[320px] text-center">

        <h1 class="text-xl mb-6">Cloud Leak Analyzer</h1>

        <form method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="Username"
                class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10">

            <input type="password" name="password" placeholder="Password"
                class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10">

            <button class="w-full bg-white text-black py-2 rounded-lg">
                Login
            </button>
        </form>

    </div>

</div>

<script>
const scene = new THREE.Scene();
const camera = new THREE.Camera();
const renderer = new THREE.WebGLRenderer({ antialias: true });

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const geometry = new THREE.PlaneBufferGeometry(2, 2);

let mouse = { x: 0.5, y: 0.5 };

window.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX / window.innerWidth;
    mouse.y = 1.0 - (e.clientY / window.innerHeight);
});

const material = new THREE.ShaderMaterial({
    uniforms: {
        time: { value: 0 },
        resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
        mouse: { value: new THREE.Vector2(0.5, 0.5) }
    },
    fragmentShader: `
        uniform float time;
        uniform vec2 resolution;
        uniform vec2 mouse;

        void main() {
            vec2 uv = gl_FragCoord.xy / resolution;
            uv -= 0.5;

            // mouse shift
            uv += (mouse - 0.5) * 0.2;

            float r = length(uv);

            // create sphere shape
            float sphere = smoothstep(0.5, 0.2, r);

            // horizon mask (cut top)
            float mask = step(uv.y, 0.2);

            // glow edge
            float glow = pow(0.5 - r, 3.0);

            // purple gradient
            vec3 color = vec3(0.05, 0.0, 0.1);
            color += vec3(0.7, 0.2, 1.0) * sphere;
            color += vec3(1.0, 0.4, 1.0) * glow;

            // combine
            float finalShape = sphere * mask;

            gl_FragColor = vec4(color * finalShape, 1.0);
        }
    `
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

function animate() {
    material.uniforms.time.value += 0.01;
    material.uniforms.mouse.value.set(mouse.x, mouse.y);
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    material.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>

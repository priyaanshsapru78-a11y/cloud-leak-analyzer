<!DOCTYPE html>
<html>
<head>
    <title>Cloud Leak Analyzer</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: #020617;
            overflow: hidden;
            color: white;
        }

        /* BACKGROUND */
        .bg::before, .bg::after {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            z-index: -1;
        }

        .bg::before {
            background: radial-gradient(circle at 30% 40%, rgba(0, 102, 255, 0.4), transparent 60%);
            animation: move1 12s ease-in-out infinite;
        }

        .bg::after {
            background: radial-gradient(circle at 70% 60%, rgba(59, 130, 246, 0.3), transparent 60%);
            animation: move2 14s ease-in-out infinite;
        }

        @keyframes move1 {
            0% { transform: translate(0,0); }
            50% { transform: translate(-10%, -10%); }
            100% { transform: translate(0,0); }
        }

        @keyframes move2 {
            0% { transform: translate(0,0); }
            50% { transform: translate(10%, 10%); }
            100% { transform: translate(0,0); }
        }

        /* LAYOUT */
        .main {
            display: flex;
            height: 100vh;
            padding: 60px;
            align-items: center;
            justify-content: space-between;
        }

        /* LEFT SIDE */
        .left {
            max-width: 500px;
        }

        .left h1 {
            font-size: 42px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .left p {
            color: #aaa;
            font-size: 16px;
            line-height: 1.6;
        }

        /* RIGHT SIDE */
        .box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 14px;
            width: 320px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        input::placeholder {
            color: #aaa;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: white;
            color: black;
            cursor: pointer;
        }

        button:hover {
            background: #ddd;
        }

        a {
            color: #aaa;
            display: block;
            margin-top: 15px;
            text-decoration: none;
        }

        a:hover {
            color: white;
        }

    </style>
</head>

<body>

<div class="bg"></div>

<div class="main">

    <!-- LEFT CONTENT -->
    <div class="left">
        <h1>A new way to secure your cloud</h1>
        <p>
            Analyze your storage, detect sensitive leaks, and understand risks instantly.
            Built for developers who care about security.
        </p>
    </div>

    <!-- LOGIN BOX -->
    <div class="box">
        <h2>Login</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <a href="/signup">Create account</a>
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Cloud Leak Analyzer</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* subtle animated gradient */
        .bg-animate {
            background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                        radial-gradient(circle at 80% 70%, #2563eb, transparent),
                        #020617;
            background-size: 200% 200%;
            animation: move 10s ease-in-out infinite;
        }

        @keyframes move {
            0% { background-position: 0% 0%; }
            50% { background-position: 50% 50%; }
            100% { background-position: 0% 0%; }
        }
    </style>
</head>

<body class="bg-animate text-white">

<!-- NAVBAR -->
<div class="flex justify-between items-center px-10 py-6 text-sm text-gray-300">
    <div class="font-medium">Cloud Leak Analyzer</div>
    <div class="space-x-6">
        <a href="#" class="hover:text-white">Docs</a>
        <a href="#" class="hover:text-white">About</a>
    </div>
</div>

<!-- MAIN -->
<div class="flex items-center justify-between h-[80vh] px-20">

    <!-- LEFT -->
    <div class="max-w-xl">
        <p class="text-sm text-blue-400 mb-3">Cloud Security Platform</p>

        <h1 class="text-5xl font-semibold leading-tight mb-6">
            A new way to think<br>about your cloud
        </h1>

        <p class="text-gray-400 text-lg leading-relaxed">
            Detect sensitive leaks, analyze risks, and secure your storage
            with intelligent insights built for modern developers.
        </p>
    </div>

    <!-- RIGHT (LOGIN CARD) -->
    <div class="w-[340px] backdrop-blur-xl bg-white/5 border border-white/10 p-8 rounded-2xl">

        <h2 class="text-xl font-medium mb-6">Login</h2>

        <form method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="Username"
                class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10 focus:outline-none focus:border-white/30">

            <input type="password" name="password" placeholder="Password"
                class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10 focus:outline-none focus:border-white/30">

            <button type="submit"
                class="w-full bg-white text-black py-2 rounded-lg hover:bg-gray-200 transition">
                Login
            </button>
        </form>

        <p class="text-sm text-gray-400 mt-6 text-center">
            Don’t have an account?
            <a href="/signup" class="text-white hover:underline">Sign up</a>
        </p>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Cloud Leak Analyzer</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }
    </style>
</head>

<body>

<!-- LOGIN UI -->
<div class="relative z-10 h-screen flex items-center justify-center text-white">

    <div class="backdrop-blur-xl bg-white/5 border border-white/10 p-8 rounded-2xl w-[320px] text-center">

        <h1 class="text-xl mb-6">Cloud Leak Analyzer</h1>

        <form method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="Username"
                class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10">

            <input type="password" name="password" placeholder="Password"
                class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10">

            <button class="w-full bg-white text-black py-2 rounded-lg">
                Login
            </button>
        </form>

        <p class="text-sm mt-4">
            <a href="/signup">Create account</a>
        </p>

    </div>

</div>

<!-- THREE.JS SCRIPT -->
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.Camera();
    const renderer = new THREE.WebGLRenderer();

    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // PLANE
    const geometry = new THREE.PlaneBufferGeometry(2, 2);

    // SHADER (this creates motion)
    const material = new THREE.ShaderMaterial({
        uniforms: {
            time: { value: 0 }
        },
        fragmentShader: `
            uniform float time;
            void main() {
                vec2 uv = gl_FragCoord.xy / vec2(1920.0, 1080.0);

                float wave = sin(uv.x * 10.0 + time) * 0.1;
                float glow = 0.3 / length(uv - vec2(0.5, 0.2));

                vec3 color = vec3(0.02, 0.05, 0.1);
                color += vec3(0.1, 0.3, 0.8) * (wave + glow);

                gl_FragColor = vec4(color, 1.0);
            }
        `
    });

    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    function animate() {
        material.uniforms.time.value += 0.02;
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Cloud Leak Analyzer</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: #020617;
        }

        /* BASE DARK */
        .bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* LIGHT WAVE 1 */
        .bg::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(0, 102, 255, 0.4), transparent 60%);
            animation: move1 12s ease-in-out infinite;
        }

        /* LIGHT WAVE 2 */
        .bg::after {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 60%, rgba(59, 130, 246, 0.3), transparent 60%);
            animation: move2 14s ease-in-out infinite;
        }

        @keyframes move1 {
            0% { transform: translate(0,0); }
            50% { transform: translate(-10%, -10%); }
            100% { transform: translate(0,0); }
        }

        @keyframes move2 {
            0% { transform: translate(0,0); }
            50% { transform: translate(10%, 10%); }
            100% { transform: translate(0,0); }
        }

        /* CENTER CONTENT */
        .container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* GLASS CARD */
        .box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 14px;
            color: white;
            text-align: center;
            width: 320px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        input::placeholder {
            color: #aaa;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            background: white;
            color: black;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ddd;
        }

        a {
            color: #aaa;
            display: block;
            margin-top: 15px;
            text-decoration: none;
        }

        a:hover {
            color: white;
        }
    </style>
</head>

<body>

<div class="bg"></div>

<div class="container">
    <div class="box">
        <h2>Login</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <a href="/signup">Create account</a>
    </div>
</div>

</body>
</html>

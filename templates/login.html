<!DOCTYPE html>
<html>
<head>
    <title>Cloud Leak Analyzer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #020014;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div class="relative z-10 h-screen flex items-center justify-center text-white">

    <div class="backdrop-blur-xl bg-white/5 border border-white/10 p-8 rounded-2xl w-[320px] text-center">

        <h1 class="text-xl mb-6">Cloud Leak Analyzer</h1>

        <form method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="Username"
                class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10">

            <input type="password" name="password" placeholder="Password"
                class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10">

            <button class="w-full bg-white text-black py-2 rounded-lg">
                Login
            </button>
        </form>

    </div>

</div>

<script>
const scene = new THREE.Scene();
const camera = new THREE.Camera();
const renderer = new THREE.WebGLRenderer({ antialias: true });

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const geometry = new THREE.PlaneBufferGeometry(2, 2);

let mouse = { x: 0, y: 0 };

window.addEventListener("mousemove", (e) => {
    mouse.x = (e.clientX / window.innerWidth - 0.5) * 2.0;
    mouse.y = (e.clientY / window.innerHeight - 0.5) * 2.0;
});

const material = new THREE.ShaderMaterial({
    uniforms: {
        resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
        mouse: { value: new THREE.Vector2(0, 0) },
        time: { value: 0 }
    },
    fragmentShader: `
        uniform vec2 resolution;
        uniform vec2 mouse;
        uniform float time;

        void main() {
            vec2 uv = gl_FragCoord.xy / resolution;
            uv = uv * 2.0 - 1.0;
            uv.x *= resolution.x / resolution.y;

            float r = length(uv);

            // sphere mask
            float sphere = smoothstep(0.9, 0.85, r);

            // fake normal
            float z = sqrt(max(0.0, 1.0 - r*r));
            vec3 normal = normalize(vec3(uv, z));

            // light direction (mouse controlled)
            vec3 light = normalize(vec3(mouse.x * 0.5, mouse.y * 0.5 + 0.4, 1.0));

            float diff = max(dot(normal, light), 0.0);

            // horizon glow
            float horizon = smoothstep(0.0, 0.5, normal.y);

            // edge glow
            float edge = pow(1.0 - r, 3.0);

            // grid lines (subtle)
            float grid = sin(uv.x * 40.0) * 0.002;

            // base dark
            vec3 color = vec3(0.02, 0.0, 0.05);

            // purple gradient
            color += vec3(0.6, 0.2, 1.0) * diff;
            color += vec3(0.8, 0.3, 1.0) * horizon;
            color += vec3(1.0, 0.4, 1.0) * edge;

            // grid effect
            color += vec3(0.4, 0.2, 0.8) * grid;

            // apply sphere
            color *= sphere;

            // reflection
            vec2 uv2 = uv;
            uv2.y = -uv2.y - 0.6;

            float r2 = length(uv2);
            float sphere2 = smoothstep(0.9, 0.85, r2);

            float reflection = sphere2 * 0.3;

            color += vec3(0.5, 0.2, 1.0) * reflection;

            gl_FragColor = vec4(color, 1.0);
        }
    `
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

function animate() {
    material.uniforms.time.value += 0.01;
    material.uniforms.mouse.value.set(mouse.x, mouse.y);
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    material.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>

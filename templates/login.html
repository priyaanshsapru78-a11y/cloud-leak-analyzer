<!DOCTYPE html>
<html>
<head>
    <title>Cloud Leak Analyzer</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            font-family: Arial, sans-serif;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }
    </style>
</head>

<body>

<!-- LOGIN UI -->
<div class="relative z-10 h-screen flex items-center justify-center text-white">

    <div class="backdrop-blur-xl bg-white/5 border border-white/10 p-8 rounded-2xl w-[320px] text-center">

        <h1 class="text-xl mb-6 font-medium">Cloud Leak Analyzer</h1>

        <form method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="Username"
                class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10 text-white placeholder-gray-400 focus:outline-none focus:border-white/30">

            <input type="password" name="password" placeholder="Password"
                class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10 text-white placeholder-gray-400 focus:outline-none focus:border-white/30">

            <button type="submit"
                class="w-full bg-white text-black py-2 rounded-lg hover:bg-gray-200 transition">
                Login
            </button>
        </form>

        <p class="text-sm mt-4 text-gray-300">
            Don’t have an account?
            <a href="/signup" class="text-white hover:underline">Create account</a>
        </p>

    </div>

</div>

<!-- THREE.JS BACKGROUND -->
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.Camera();
    const renderer = new THREE.WebGLRenderer({ antialias: true });

    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geometry = new THREE.PlaneBufferGeometry(2, 2);

    const material = new THREE.ShaderMaterial({
        uniforms: {
            time: { value: 0 },
            resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
        },
        fragmentShader: `
            uniform float time;
            uniform vec2 resolution;

            void main() {
                vec2 uv = gl_FragCoord.xy / resolution;
                uv -= 0.5;

                // horizon glow
                float horizon = smoothstep(-0.2, 0.2, uv.y + 0.25);

                // center glow
                float glow = 0.5 / length(uv + vec2(0.0, 0.3));

                // waves
                float wave1 = sin((uv.x * 10.0) + time * 0.8) * 0.08;
                float wave2 = sin((uv.x * 5.0) - time * 0.5) * 0.06;

                // base color
                vec3 color = vec3(0.01, 0.02, 0.05);

                // blue waves
                color += vec3(0.1, 0.3, 0.8) * (wave1 + wave2);

                // horizon light
                color += vec3(0.2, 0.5, 1.0) * horizon * 0.8;

                // glow center
                color += vec3(0.3, 0.6, 1.0) * glow;

                gl_FragColor = vec4(color, 1.0);
            }
        `
    });

    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    function animate() {
        material.uniforms.time.value += 0.015;
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }

    animate();

    // RESPONSIVE
    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        material.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
    });
</script>

</body>
</html>

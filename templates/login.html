<!DOCTYPE html>
<html>
<head>
    <title>Cloud Leak Analyzer</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* PREMIUM BACKGROUND */
        .bg-animated {
            background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent),
                        radial-gradient(circle at 80% 70%, #2563eb, transparent),
                        #020617;
            background-size: 200% 200%;
            animation: move 12s ease-in-out infinite;
        }

        @keyframes move {
            0% { background-position: 0% 0%; }
            50% { background-position: 50% 50%; }
            100% { background-position: 0% 0%; }
        }
    </style>
</head>

<body class="bg-animated h-screen flex items-center justify-center text-white">

    <!-- LOGIN CARD -->
    <div class="backdrop-blur-xl bg-white/5 border border-white/10 p-8 rounded-2xl w-[320px] text-center">

        <h1 class="text-xl mb-6 font-medium">Cloud Leak Analyzer</h1>

        <form method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="Username"
                class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10 text-white placeholder-gray-400 focus:outline-none focus:border-white/30">

            <input type="password" name="password" placeholder="Password"
                class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10 text-white placeholder-gray-400 focus:outline-none focus:border-white/30">

            <button type="submit"
                class="w-full bg-white text-black py-2 rounded-lg hover:bg-gray-200 transition">
                Login
            </button>
        </form>

        <p class="text-sm text-gray-400 mt-6">
            Don’t have an account?
            <a href="/signup" class="text-white hover:underline">Sign up</a>
        </p>

    </div>

</body>
</html>
